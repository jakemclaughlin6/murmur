# analysis_options.yaml — Phase 1 lint ruleset
# flutter_lints is the official Flutter baseline.
# riverpod_lint 3.x uses analysis_server_plugin (not custom_lint) — configured via `plugins:` block below.

include: package:flutter_lints/flutter.yaml

# riverpod_lint integration via analysis_server_plugin API (riverpod_lint 3.x)
plugins:
  - riverpod_lint

analyzer:
  errors:
    # Treat TODO comments as info, not warning — Phase 1 has a few.
    todo: info

linter:
  rules:
    # Safer async patterns
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    require_trailing_commas: true
    use_key_in_widget_constructors: true
