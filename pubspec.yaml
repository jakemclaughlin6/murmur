name: murmur
description: "Offline EPUB reader with on-device neural TTS."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0
  go_router: ^17.2.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5
  package_info_plus: ^9.0.1
  epubx: ^4.0.0
  archive: ^3.6.1
  # image ^3.3.0 promoted from transitive (pulled in via epubx) to direct
  # because epub_parser.dart calls encodeJpg() on epubx's CoverImage.
  image: ^3.3.0
  file_picker: ^11.0.2
  html: ^0.15.5
  # path ^1.9 is promoted from transitive to direct because
  # lib/features/library/import_service.dart uses p.join / p.basename for
  # destination path construction (T-02-05-02 defense). Also used in tests.
  path: ^1.9.0
  # Research A2 invalidated: receive_sharing_intent_plus ^1.6.0 does not exist
  # (latest is 1.0.1 and the package is marked discontinued on pub.dev, replaced by
  # receive_sharing_intent). Switched to the maintained original package.
  receive_sharing_intent: ^1.8.1
  # Phase 4 TTS engine + playback. http + crypto are single-use: one-time
  # Kokoro model download on first launch only (see CLAUDE.md constraints).
  sherpa_onnx: 1.12.36          # EXACT pin — NOT caret. Patch cadence is fast.
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  http: ^1.2.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.13
  drift_dev: ^2.32.1
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.0.0
  flutter_lints: ^5.0.0

# Phase 2 dependency overrides:
#
# 1. analyzer ^10.0.0 — resolves drift_dev 2.32.1 (requires analyzer >=10) vs
#    riverpod_generator 4.0.3 (pins analyzer ^9) conflict. riverpod_generator
#    uses a subset of analyzer's public API unchanged between v9 and v10, so the
#    override is empirically safe. See riverpod GH #4393, #4684, #4698, #4716.
#
# 2. win32 override REMOVED — downgraded package_info_plus from ^10.0.0 to
#    ^9.0.1 so both file_picker 11.0.2 (win32 ^5.9.0) and package_info_plus
#    9.x (win32 ^5.x) resolve without conflict. The win32 ^6.0.0 override
#    broke release builds because Dart's AOT compiler still compiles
#    file_picker's Windows implementation even when targeting Android.
dependency_overrides:
  analyzer: ^10.0.0
  # dart_style 3.1.3 (pinned transitively by build_runner tooling) uses an
  # analyzer 8/9-era API (ParserErrorCode); 3.1.4+ supports analyzer ^10.0.0.
  # Pinned to ^3.1.4 <3.1.8 because 3.1.8 moves to analyzer ^12.
  dart_style: ">=3.1.4 <3.1.8"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/OFL.txt
    - assets/kokoro/voices.bin
    - assets/kokoro/tokens.txt
    - assets/kokoro/LICENSE
    - assets/kokoro/espeak-ng-data/
    - assets/kokoro/espeak-ng-data/lang/
    - assets/kokoro/espeak-ng-data/lang/aav/
    - assets/kokoro/espeak-ng-data/lang/art/
    - assets/kokoro/espeak-ng-data/lang/azc/
    - assets/kokoro/espeak-ng-data/lang/bat/
    - assets/kokoro/espeak-ng-data/lang/bnt/
    - assets/kokoro/espeak-ng-data/lang/ccs/
    - assets/kokoro/espeak-ng-data/lang/cel/
    - assets/kokoro/espeak-ng-data/lang/cus/
    - assets/kokoro/espeak-ng-data/lang/dra/
    - assets/kokoro/espeak-ng-data/lang/esx/
    - assets/kokoro/espeak-ng-data/lang/gmq/
    - assets/kokoro/espeak-ng-data/lang/gmw/
    - assets/kokoro/espeak-ng-data/lang/grk/
    - assets/kokoro/espeak-ng-data/lang/inc/
    - assets/kokoro/espeak-ng-data/lang/ine/
    - assets/kokoro/espeak-ng-data/lang/ira/
    - assets/kokoro/espeak-ng-data/lang/iro/
    - assets/kokoro/espeak-ng-data/lang/itc/
    - assets/kokoro/espeak-ng-data/lang/jpx/
    - assets/kokoro/espeak-ng-data/lang/map/
    - assets/kokoro/espeak-ng-data/lang/miz/
    - assets/kokoro/espeak-ng-data/lang/myn/
    - assets/kokoro/espeak-ng-data/lang/poz/
    - assets/kokoro/espeak-ng-data/lang/roa/
    - assets/kokoro/espeak-ng-data/lang/sai/
    - assets/kokoro/espeak-ng-data/lang/sem/
    - assets/kokoro/espeak-ng-data/lang/sit/
    - assets/kokoro/espeak-ng-data/lang/tai/
    - assets/kokoro/espeak-ng-data/lang/trk/
    - assets/kokoro/espeak-ng-data/lang/urj/
    - assets/kokoro/espeak-ng-data/lang/zle/
    - assets/kokoro/espeak-ng-data/lang/zls/
    - assets/kokoro/espeak-ng-data/lang/zlw/
    - assets/kokoro/espeak-ng-data/voices/
    - assets/kokoro/espeak-ng-data/voices/!v/
