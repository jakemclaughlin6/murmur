name: murmur
description: "Offline EPUB reader with on-device neural TTS."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.0
  go_router: ^17.2.0
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.5
  package_info_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.0.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/OFL.txt
  fonts:
    - family: Literata
      fonts:
        - asset: assets/fonts/literata/Literata-Regular.ttf
        - asset: assets/fonts/literata/Literata-Bold.ttf
          weight: 700
    - family: Merriweather
      fonts:
        - asset: assets/fonts/merriweather/Merriweather-Regular.ttf
        - asset: assets/fonts/merriweather/Merriweather-Bold.ttf
          weight: 700
