name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  android:
    name: Android (signed debug AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code (build_runner)
        # *.g.dart files are committed per 01-RESEARCH.md §Pitfall 4 Option A,
        # so this step is technically redundant — but running it guarantees CI
        # and local produce identical generated output. If the committed files
        # are stale, this will fail and force a commit.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify Android manifest allow-list
        run: bash scripts/verify_android_manifest.sh

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Build signed debug AAB
        # --debug uses the committed debug.keystore via signingConfig "debugCommitted"
        # declared in android/app/build.gradle.kts (Plan 03 Task 2).
        run: flutter build appbundle --debug

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: murmur-debug.aab
          path: build/app/outputs/bundle/debug/app-debug.aab
          if-no-files-found: error
          retention-days: 14

  ios-scaffold:
    name: iOS (workflow_dispatch only — unsigned xcarchive)
    # iOS builds ONLY on manual trigger. Push-to-main does NOT run this job.
    # Per D-06: Phase 1's iOS deliverable is an unsigned .xcarchive proving
    # Info.plist keys + deployment target compile on macos-14. Full signed IPA
    # is deferred to Phase 4 once Apple Developer Program enrollment lands.
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify iOS Info.plist keys
        run: bash scripts/verify_ios_plist.sh

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Pod install
        run: cd ios && pod install

      - name: Build iOS (unsigned)
        run: flutter build ios --no-codesign --release

      - name: Archive unsigned xcarchive
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: murmur-unsigned.xcarchive
          path: build/ios/Runner.xcarchive
          retention-days: 14
