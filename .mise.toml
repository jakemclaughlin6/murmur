[tools]
flutter = "3.41.0"
java = "17"
yq = "latest"
"android-sdk" = "16.0"

[env]
ANDROID_HOME = "{{ env.MISE_DATA_DIR }}/installs/android-sdk/16.0"
ANDROID_SDK_ROOT = "{{ env.MISE_DATA_DIR }}/installs/android-sdk/16.0"

[tasks.doctor]
run = "flutter doctor"
description = "Verify Flutter + Android toolchain"

[tasks.setup-android]
run = """
yes | sdkmanager --licenses
sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "platforms;android-36" "build-tools;28.0.3"
"""
description = "One-time Android SDK component install + license acceptance (includes SDK 34 for app target and SDK 36 + build-tools 28.0.3 required by Flutter 3.41)"
